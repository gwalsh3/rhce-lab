---
- name: Get current timezone
  ansible.builtin.command: timedatectl show --property=Timezone --value
  register: _current_tz
  changed_when: false

- name: Check NTP synchronization status
  ansible.builtin.command: timedatectl show --property=NTPSynchronized --value
  register: _ntp_synced
  changed_when: false

- name: Ensure NTP service is started and enabled
  ansible.builtin.service:
    name: "{{ ntp_service }}"
    state: started
    enabled: true

- name: Set timezone
  ansible.builtin.command: timedatectl set-timezone {{ ntp_timezone }}
  register: _tz_changed
  changed_when: true
  when: _current_tz.stdout != ntp_timezone

- name: Restart NTP service after timezone change
  ansible.builtin.service:
    name: "{{ ntp_service }}"
    state: restarted
  when: _tz_changed is changed

- name: Report time synchronization status
  ansible.builtin.debug:
    msg: >-
      Timezone: {{ _current_tz.stdout }}{{ ' -> ' + ntp_timezone if _tz_changed is changed else '' }} |
      NTP synchronized: {{ _ntp_synced.stdout }}
