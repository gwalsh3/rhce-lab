---
# update_control_node.yml
# Run: ansible-playbook update_control_node.yml
# Updates the Ansible control node itself (no inventory required).
- name: Update Ansible control node
  hosts: localhost
  connection: local
  become: true

  tasks:

    - name: Ensure yum-utils is installed
      ansible.builtin.dnf:
        name: yum-utils
        state: present

    - name: Update all packages
      ansible.builtin.dnf:
        name: '*'
        state: latest
        update_cache: true
      register: update_result

    - name: Build list of updated packages
      ansible.builtin.set_fact:
        updated_packages: >-
          {{ update_result.results | default([])
             | select('search', 'Installed:|Upgraded:|Updated:')
             | list }}

    - name: Display update summary
      ansible.builtin.debug:
        msg:
          - "===== Update Summary for {{ inventory_hostname }} ====="
          - "Changed: {{ update_result.changed }}"
          - "Packages affected: {{ updated_packages | length }}"
          - "{{ updated_packages if updated_packages | length > 0 else ['All packages already up to date.'] }}"

    - name: Upgrade Ansible and dependencies via pip (if pip-managed)
      ansible.builtin.pip:
        name:
          - ansible
          - ansible-core
        state: latest
        executable: "{{ ansible_pip_executable | default('pip3') }}"
      when: ansible_pip_managed | default(false)
      ignore_errors: true

    - name: Check if reboot is required
      ansible.builtin.command: /usr/bin/needs-restarting -r
      register: reboot_required
      changed_when: reboot_required.rc == 1
      failed_when: reboot_required.rc > 1
      when: update_result.changed

    - name: Reboot if kernel or core libraries were updated
      ansible.builtin.reboot:
        msg: "Rebooting control node after package updates"
        reboot_timeout: 300
      when:
        - update_result.changed
        - reboot_required.rc is defined
        - reboot_required.rc == 1

    - name: Display reboot status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}:
          {% if update_result.changed and reboot_required.rc is defined %}
            {% if reboot_required.rc == 1 %}Reboot was performed.
            {% else %}No reboot required.{% endif %}
          {% else %}No packages were updated.{% endif %}
      when: true
