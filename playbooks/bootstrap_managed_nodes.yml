# bootstrap_managed_nodes.yml
# Run as root: ansible-playbook -i inventory/hosts bootstrap_managed_nodes.yml --ask-pass --ask-become-pass
- name: Bootstrap rhce-admin on managed nodes
  hosts: RHEL10_VMs
  remote_user: root
  become: true

  vars:
    operator_user: rhce-admin
    operator_group: ansible
    operator_home: /home/rhce-admin

  tasks:

    - name: Create ansible group
      group:
        name: "{{ operator_group }}"
        state: present

    - name: Create rhce-admin user
      user:
        name: "{{ operator_user }}"
        group: "{{ operator_group }}"
        home: "{{ operator_home }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Deploy sudoers drop-in for ansible group
      copy:
        dest: /etc/sudoers.d/ansible
        content: "%{{ operator_group }} ALL=(ALL) NOPASSWD: ALL\n"
        owner: root
        group: root
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Create .ssh directory
      file:
        path: "{{ operator_home }}/.ssh"
        state: directory
        owner: "{{ operator_user }}"
        group: "{{ operator_group }}"
        mode: '0700'

    - name: Read control node public key
      slurp:
        src: /home/rhce-admin/.ssh/id_ed25519.pub
      register: pub_key
      delegate_to: localhost

    - name: Push control node public key to managed nodes
      copy:
        content: "{{ pub_key.content | b64decode }}"
        dest: "{{ operator_home }}/.ssh/authorized_keys"
        owner: "{{ operator_user }}"
        group: "{{ operator_group }}"
        mode: '0600'
